name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '11.0.x'
        dotnet-quality: 'preview'
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --solution s2protocol.NET.sln --no-build --verbosity normal --report-trx --results-directory TestResults
    - name: Test Report
      uses: dorny/test-reporter@v2
      if: success() || failure()
      with:
        name: MSTest Tests
        path: TestResults/*.trx
        reporter: dotnet-trx
